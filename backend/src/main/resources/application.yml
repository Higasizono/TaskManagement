spring:
  application:
    name: task-management-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/taskmanagement}
    username: ${SPRING_DATASOURCE_USERNAME:taskmanagement}
    password: ${SPRING_DATASOURCE_PASSWORD:taskmanagement}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: 8080
